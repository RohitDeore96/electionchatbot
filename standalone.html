<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Assistant (Standalone)</title>
    <style>
        /* Embedding the styles for standalone rendering since npm is missing */
        :root {
            --primary-color: #4A90E2;
            --secondary-color: #50E3C2;
            --background-color: #0F172A;
            --surface-color: #1E293B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --accent-color: #F5A623;
            --success-color: #10B981;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            background: var(--surface-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .main {
            flex: 1;
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }
        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }
        .hero h1 {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .chat-box {
            background: var(--surface-color);
            border-radius: 12px;
            height: 400px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: bold;
        }
        .chat-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: 16px;
        }
        .bot-message {
            background: rgba(255,255,255,0.05);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .user-message {
            background: var(--primary-color);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .chat-input-area {
            display: flex;
            padding: 1rem;
            gap: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .chat-input-area input {
            flex: 1;
            padding: 0.8rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
            color: white;
        }
        .chat-input-area button {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        .feature-card {
            background: var(--surface-color);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">🛡️ ElectAssist</div>
        <div>
            <button style="background:var(--primary-color);color:white;border:none;padding:0.5rem 1rem;border-radius:20px;">Sign In</button>
        </div>
    </header>

    <main class="main">
        <div class="hero">
            <h1>Your Personal Election Guide</h1>
            <p style="color:var(--text-secondary)">Understand processes, track timelines, and vote with confidence.</p>
        </div>

        <div class="chat-box">
            <div class="chat-header">🤖 AI Election Assistant</div>
            <div class="chat-messages" id="messages">
                <div class="message bot-message">Hello! I'm your Election Assistant. How can I help you today?</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Ask about voting..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>

        <div class="features-grid">
            <div class="feature-card">📅<br>Election Timeline</div>
            <div class="feature-card">📍<br>Polling Stations</div>
            <div class="feature-card">✅<br>Eligibility Checker</div>
            <div class="feature-card">📖<br>Voting Guide</div>
        </div>
    </main>

    <script>
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const messages = document.getElementById('messages');
            if(!input.value.trim()) return;

            // Add user message
            const userMsg = document.createElement('div');
            userMsg.className = 'message user-message';
            userMsg.textContent = input.value;
            messages.appendChild(userMsg);

            input.value = '';
            messages.scrollTop = messages.scrollHeight;

            // Call Gemini API directly via REST for the standalone demo
            const apiKey = "AIzaSyC8RzVCiSt6ga1MA8XPIwEn2oUMD90vNIk";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`;
            
            fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `You are an Election Assistant. Keep it strictly politically neutral. Answer the following: ${input.value}`
                        }]
                    }]
                })
            })
            .then(res => res.json())
            .then(data => {
                const botMsg = document.createElement('div');
                botMsg.className = 'message bot-message';
                botMsg.textContent = data.candidates && data.candidates[0] ? data.candidates[0].content.parts[0].text : "I couldn't process that.";
                messages.appendChild(botMsg);
                messages.scrollTop = messages.scrollHeight;
            })
            .catch(err => {
                const botMsg = document.createElement('div');
                botMsg.className = 'message bot-message';
                botMsg.textContent = "Error connecting to AI. Check console.";
                messages.appendChild(botMsg);
                console.error(err);
            });
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
